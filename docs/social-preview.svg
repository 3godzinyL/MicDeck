<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">MicDeck</title>
  <desc id="description">Soundboard, system audio, one virtual microphone.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11151a"/>
      <stop offset=".48" stop-color="#090b0e"/>
      <stop offset="1" stop-color="#0d1013"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(260 110) rotate(36) scale(520 360)">
      <stop stop-color="#c8ff63" stop-opacity=".18"/>
      <stop offset="1" stop-color="#c8ff63" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ddff91"/>
      <stop offset="1" stop-color="#a8e838"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000" flood-opacity=".52"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <clipPath id="panelClip">
      <rect x="744" y="70" width="472" height="500" rx="30"/>
    </clipPath>
  </defs>

  <rect width="1280" height="640" rx="24" fill="url(#background)"/>
  <rect width="1280" height="640" rx="24" fill="url(#glow)"/>
  <path d="M0 560C250 470 420 650 700 535s380-60 580-20v125H0Z" fill="#c8ff63" opacity=".025"/>
  <g opacity=".12" stroke="#7d878f" stroke-width="1">
    <path d="M0 80h1280M0 160h1280M0 240h1280M0 320h1280M0 400h1280M0 480h1280M0 560h1280"/>
    <path d="M80 0v640M160 0v640M240 0v640M320 0v640M400 0v640M480 0v640M560 0v640M640 0v640M720 0v640M800 0v640M880 0v640M960 0v640M1040 0v640M1120 0v640M1200 0v640"/>
  </g>

  <g transform="translate(72 58)">
    <rect width="58" height="58" rx="16" fill="#c8ff63"/>
    <path d="M13 44V14h8l8 12 8-12h8v30h-8V27L29 41 21 27v17Z" fill="#0b0d10"/>
    <text x="76" y="24" fill="#f5f7f8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="800" letter-spacing="4">MICDECK</text>
    <text x="77" y="48" fill="#818b92" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" letter-spacing="2.5">WINDOWS AUDIO CONTROL</text>
  </g>

  <g transform="translate(72 188)">
    <text fill="#f7f9fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="66" font-weight="780" letter-spacing="-2">
      <tspan x="0" y="0">Soundboard.</tspan>
      <tspan x="0" y="76">System audio.</tspan>
      <tspan x="0" y="152" fill="url(#lime)">One virtual mic.</tspan>
    </text>
    <text x="2" y="210" fill="#9aa3a9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="450">
      Native Rust + C++ routing for Discord, games and voice chat.
    </text>
  </g>

  <g transform="translate(72 545)">
    <g>
      <rect width="106" height="34" rx="17" fill="#151a1f" stroke="#30383f"/>
      <circle cx="19" cy="17" r="4" fill="#c8ff63"/>
      <text x="32" y="22" fill="#ccd2d6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="650">LOCAL-FIRST</text>
    </g>
    <g transform="translate(120)">
      <rect width="116" height="34" rx="17" fill="#151a1f" stroke="#30383f"/>
      <text x="17" y="22" fill="#ccd2d6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="650">LOW LATENCY</text>
    </g>
    <g transform="translate(250)">
      <rect width="137" height="34" rx="17" fill="#151a1f" stroke="#30383f"/>
      <text x="17" y="22" fill="#ccd2d6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="650">WINDOWS 10 / 11</text>
    </g>
  </g>

  <circle cx="1040" cy="130" r="90" fill="#c8ff63" opacity=".08" filter="url(#softGlow)"/>
  <g filter="url(#shadow)">

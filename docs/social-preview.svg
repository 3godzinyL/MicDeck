    <g clip-path="url(#panelClip)">
      <rect x="744" y="70" width="104" height="500" fill="#0b0e11"/>
      <rect x="766" y="94" width="42" height="42" rx="12" fill="#c8ff63"/>
      <path d="M775 127V103h6l6 9 6-9h6v24h-6v-13l-6 10-6-10v13Z" fill="#0b0e11"/>

      <rect x="762" y="173" width="68" height="50" rx="12" fill="#1a211b" stroke="#324823"/>
      <rect x="774" y="188" width="18" height="18" rx="5" fill="#c8ff63" opacity=".9"/>
      <path d="M778 201v-8l8 4Z" fill="#10130f"/>
      <rect x="762" y="237" width="68" height="50" rx="12" fill="#12161a"/>
      <rect x="774" y="252" width="18" height="18" rx="5" fill="#293038"/>
      <path d="M779 257h8v8h-8Z" fill="#77818a"/>
      <rect x="762" y="301" width="68" height="50" rx="12" fill="#12161a"/>
      <circle cx="783" cy="326" r="9" fill="#293038"/>

      <text x="876" y="117" fill="#7f8990" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="2">LIVE STUDIO</text>
      <text x="876" y="149" fill="#f4f6f7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="750">Your audio route</text>

      <rect x="876" y="176" width="310" height="112" rx="18" fill="#171c21" stroke="#30383f"/>
      <text x="896" y="202" fill="#8e989f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.6">SOURCES</text>
      <g transform="translate(896 220)">
        <rect width="270" height="7" rx="3.5" fill="#292f34"/>
        <rect width="187" height="7" rx="3.5" fill="url(#lime)"/>
        <circle cx="187" cy="3.5" r="7" fill="#e4ffae"/>
      </g>
      <text x="896" y="260" fill="#dce1e4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="650">Microphone + desktop + pads</text>

      <rect x="876" y="306" width="148" height="100" rx="18" fill="#171c21" stroke="#30383f"/>
      <text x="894" y="330" fill="#8e989f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">LATENCY</text>
      <text x="894" y="370" fill="#f4f6f7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="760">12.4</text>
      <text x="959" y="370" fill="#7f8990" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="650">ms</text>
      <text x="894" y="391" fill="#a9ed4b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700">STABLE</text>

      <rect x="1038" y="306" width="148" height="100" rx="18" fill="#171c21" stroke="#30383f"/>
      <text x="1056" y="330" fill="#8e989f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">OUTPUT</text>
      <text x="1056" y="360" fill="#f4f6f7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Virtual mic</text>
      <circle cx="1062" cy="385" r="4" fill="#c8ff63"/>
      <text x="1074" y="389" fill="#aeb6bb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">Broadcasting</text>

      <rect x="876" y="424" width="310" height="88" rx="18" fill="#c8ff63"/>
      <circle cx="906" cy="468" r="14" fill="#0c0f11" opacity=".14"/>
      <path d="M901 468h10m-5-5v10" stroke="#0c0f11" stroke-width="2.2" stroke-linecap="round"/>
      <text x="934" y="462" fill="#0d100e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="750" letter-spacing="1.3">SYSTEM AUDIO</text>
      <text x="934" y="484" fill="#0d100e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="780">Sharing is on</text>
      <rect x="1132" y="450" width="36" height="36" rx="18" fill="#0c0f11"/>
      <path d="m1144 468 7 6 8-12" fill="none" stroke="#c8ff63" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <rect x="1" y="1" width="1278" height="638" rx="23" fill="none" stroke="#394149" opacity=".75"/>
